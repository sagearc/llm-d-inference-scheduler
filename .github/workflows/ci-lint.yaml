name: CI - Lint

on:
  push:
    branches:
      - main
      - 'release-*'
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - '**/*.go'
              - Dockerfile.*
              - Makefile*
              - go.mod
              - go.sum
              - .golangci.yml
              - .typos.toml
              - scripts/**
              - .github/workflows/ci-lint.yaml

  lint:
    needs: check-changes
    if: ${{ needs.check-changes.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify go.mod and go.sum are tidy
        run: go mod tidy -diff

      - name: Create and resolve Go cache volumes
        id: go-cache
        run: |
          docker volume create llm-d-gomodcache
          docker volume create llm-d-gobuildcache
          echo "mod=$(docker volume inspect llm-d-gomodcache -f '{{.Mountpoint}}')" >> $GITHUB_OUTPUT
          echo "build=$(docker volume inspect llm-d-gobuildcache -f '{{.Mountpoint}}')" >> $GITHUB_OUTPUT

      - name: Cache Go modules and build cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.go-cache.outputs.mod }}
            ${{ steps.go-cache.outputs.build }}
          key: go-cache-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-cache-

      - name: Run make build
        run: make build

      - name: Run make lint
        run: make lint

      - name: Run make vulncheck
        run: make vulncheck
